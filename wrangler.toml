# Cloudflare Workers Configuration — 3D Empyre
# Parallel migration: Netlify setup remains intact until cutover.

name = "3d-empyre"
main = "worker/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

# Reduce cold-start: keep Worker warm in regions with traffic
# (free plan gets 1 instance; paid plans benefit more)
[placement]
mode = "smart"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

[vars]
ENVIRONMENT = "production"
SUPABASE_URL = ""
SUPABASE_ANON_KEY = ""
SUPABASE_STORAGE_BUCKET = "assets"

# Secrets (set via `wrangler secret put`):
# - SUPABASE_SERVICE_ROLE_KEY
# - GEMINI_API_KEY
