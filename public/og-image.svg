<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect fill="url(#bg)" width="1200" height="630"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect fill="url(#grid)" width="1200" height="630"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="315" rx="400" ry="250" fill="url(#glow)"/>

  <!-- 3D cube icon -->
  <g transform="translate(540, 140)">
    <!-- Cube faces -->
    <polygon points="60,0 120,30 120,90 60,120 0,90 0,30" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1.5"/>
    <polygon points="60,0 120,30 60,60 0,30" fill="#7c3aed" opacity="0.3"/>
    <polygon points="120,30 120,90 60,120 60,60" fill="#7c3aed" opacity="0.15"/>
    <polygon points="0,30 60,60 60,120 0,90" fill="#7c3aed" opacity="0.25"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="340" text-anchor="middle" fill="white" font-size="52" font-weight="800" font-family="system-ui,-apple-system,sans-serif" letter-spacing="-1">
    3D Empyre
  </text>

  <!-- Tagline -->
  <text x="600" y="390" text-anchor="middle" fill="#a1a1aa" font-size="22" font-weight="400" font-family="system-ui,-apple-system,sans-serif">
    Professional 3D Capture &amp; AR Services for Enterprise
  </text>

  <!-- Feature pills -->
  <g transform="translate(280, 430)">
    <rect x="0" y="0" width="160" height="36" rx="18" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1"/>
    <text x="80" y="23" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600" font-family="system-ui">Photogrammetry</text>

    <rect x="180" y="0" width="100" height="36" rx="18" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1"/>
    <text x="230" y="23" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600" font-family="system-ui">WebAR</text>

    <rect x="300" y="0" width="120" height="36" rx="18" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1"/>
    <text x="360" y="23" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600" font-family="system-ui">3D Menus</text>

    <rect x="440" y="0" width="200" height="36" rx="18" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1"/>
    <text x="540" y="23" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600" font-family="system-ui">Enterprise-Grade</text>
  </g>

  <!-- Domain -->
  <text x="600" y="560" text-anchor="middle" fill="#52525b" font-size="16" font-weight="500" font-family="system-ui">
    3dempyre.com
  </text>
</svg>
